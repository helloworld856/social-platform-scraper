name: ✨ 功能建议
description: 提出新功能、改进优化或其他想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！提交前请先搜索已有 issue，避免重复。

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 描述你在什么场景下需要这个功能，它要解决什么问题
      placeholder: |
        例如：「我需要批量导出 TikTok 评论中的图片链接，因为目前只能导出文字……」
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望行为
      description: 描述你希望这个功能如何工作
      placeholder: |
        例如：「在参数配置中增加一个勾选项「导出评论图片链接」，勾选后输出的评论列会追加图片 URL……」
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 涉及平台
      description: 这个功能建议涉及哪个/哪些平台？
      multiple: true
      options:
        - YouTube
        - TikTok
        - X/Twitter
        - Instagram
        - 数据处理（AIGC / XLSX 合并）
        - 所有平台 / 通用功能
        - 不涉及平台（UI / 体验）

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 是否考虑过其他替代方案或临时绕过方法？

  - type: textarea
    id: additional
    attributes:
      label: 补充信息（可选）
      description: 其他任何和这个功能建议相关的信息
